<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>新規登録 — SmartKakeibo</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="manifest" href="/static/manifest.json">
<style>
body { background: #f5f6f8; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
.card-login { background: #fff; border-radius: 18px; box-shadow: 0 2px 12px rgba(0,0,0,.08); padding: 32px 28px; width: 100%; max-width: 360px; }
.logo { font-size: 28px; font-weight: 700; background: linear-gradient(135deg, #667eea, #764ba2); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-align: center; margin-bottom: 6px; }
.sub { text-align: center; color: #888; font-size: 13px; margin-bottom: 24px; }
.btn-primary { background: linear-gradient(135deg, #667eea, #764ba2); border: none; }
.btn-primary:hover { opacity: .9; }
</style>
</head>
<body>
<div class="card-login">
  <div class="logo">💰 SmartKakeibo</div>
  <div class="sub">新規アカウント登録</div>
  {% if error %}
  <div class="alert alert-danger py-2" style="font-size:13px;">{{ error }}</div>
  {% endif %}
  <form method="POST">
    <div class="mb-3">
      <label class="form-label fw-bold" style="font-size:13px;">ユーザー名</label>
      <input type="text" name="username" class="form-control" required autofocus placeholder="例: tanaka">
    </div>
    <div class="mb-3">
      <label class="form-label fw-bold" style="font-size:13px;">パスワード（4文字以上）</label>
      <input type="password" name="password" class="form-control" required>
    </div>
    <div class="mb-4">
      <label class="form-label fw-bold" style="font-size:13px;">パスワード（確認）</label>
      <input type="password" name="password2" class="form-control" required>
    </div>
    <button type="submit" class="btn btn-primary w-100 fw-bold">登録してはじめる</button>
  </form>
  <div class="text-center mt-3" style="font-size:13px; color:#888;">
    すでにアカウントをお持ちの方は <a href="/login" style="color:#667eea;">ログイン</a>
  </div>
</div>
</body>
</html>
